name: Android App Store Release

on:
  workflow_dispatch:
    inputs:
      android_track:
        description: 'Google Play track to publish to'
        type: choice
        options:
          - production
          - beta
          - alpha
        required: true
        default: 'production'

concurrency:
  group: mobile-release-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  android-release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    outputs:
      requested_track: ${{ steps.play_result.outputs.requested_track }}
      effective_track: ${{ steps.play_result.outputs.effective_track }}
      fallback_used: ${{ steps.play_result.outputs.fallback_used }}
      precondition_blocked: ${{ steps.play_result.outputs.precondition_blocked }}
      version_code: ${{ steps.play_result.outputs.version_code }}
    steps:
      - uses: actions/checkout@v6

      - name: Fail fast on required Android release secrets
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in GOOGLE_PLAY_JSON_KEY ANDROID_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done

      - name: Preflight release checks (Android)
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"","project_id":"","storage_bucket":""},"client":[{"client_info":{"mobilesdk_app_id":"1:859477231475:android:3f1d19d04dfef89b1f6706","android_client_info":{"package_name":"com.iganapolsky.agentbill"}},"api_key":[{"current_key":""}]}]}' > app/google-services.json
          fi
        working-directory: android/Agent-Bill

      - name: Write Google Play service account key
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          if [ -z "$GOOGLE_PLAY_JSON_KEY" ]; then
            echo "❌ GOOGLE_PLAY_JSON_KEY secret is not set"
            exit 1
          fi
          echo "$GOOGLE_PLAY_JSON_KEY" > /tmp/play-service-account.json

      - name: Verify Google Play API access
        env:
          GOOGLE_PLAY_JSON_KEY: /tmp/play-service-account.json
        run: |
          python -m pip install google-api-python-client==2.190.0 google-auth==2.48.0 google-auth-httplib2==0.3.0 google-auth-oauthlib==1.2.4 requests==2.32.5
          python scripts/check_store_access.py --platform android --android-package com.iganapolsky.agentbill

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
          echo "✅ Keystore decoded"

      - name: Inspect upload key certificate
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -list -v \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" | grep -E "Alias name:|Valid from:|SHA1:|SHA-256:"

      - name: Build release AAB
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease
        working-directory: android/Agent-Bill

      - name: Upload to Google Play (track)
        env:
          GOOGLE_PLAY_JSON_KEY: /tmp/play-service-account.json
          PLAY_TRACK: ${{ inputs.android_track }}
          PLAY_FALLBACK_TRACK: alpha
          PLAY_RELEASE_STATUS: completed
          PLAY_UPLOAD_RETRY_WINDOW_SECONDS: "10800"
          PLAY_UPLOAD_RETRY_INTERVAL_SECONDS: "300"
        run: |
          if [ ! -f "$GOOGLE_PLAY_JSON_KEY" ]; then
            echo "❌ Google Play key file not found at $GOOGLE_PLAY_JSON_KEY"
            exit 1
          fi
          pip install google-api-python-client==2.190.0 google-auth==2.48.0 google-auth-httplib2==0.3.0 google-auth-oauthlib==1.2.4
          python scripts/play_publish.py \
            --service-account-json "$GOOGLE_PLAY_JSON_KEY" \
            --package com.iganapolsky.agentbill \
            --aab-path android/Agent-Bill/app/build/outputs/bundle/release/app-release.aab \
            --requested-track "$PLAY_TRACK" \
            --fallback-track "$PLAY_FALLBACK_TRACK" \
            --release-status "$PLAY_RELEASE_STATUS" \
            --retry-window-seconds "$PLAY_UPLOAD_RETRY_WINDOW_SECONDS" \
            --retry-interval-seconds "$PLAY_UPLOAD_RETRY_INTERVAL_SECONDS" \
            --result-json /tmp/play-upload-result.json \
            --error-json /tmp/play-upload-error.json

      - name: Capture Play publish result outputs
        id: play_result
        if: always()
        run: |
          REQUESTED_TRACK="${{ inputs.android_track }}"
          EFFECTIVE_TRACK="${{ inputs.android_track }}"
          FALLBACK_USED="false"
          PRECONDITION_BLOCKED="false"
          VERSION_CODE=""

          if [ -f /tmp/play-upload-result.json ]; then
            REQUESTED_TRACK="$(jq -r '.requested_track // empty' /tmp/play-upload-result.json)"
            EFFECTIVE_TRACK="$(jq -r '.effective_track // empty' /tmp/play-upload-result.json)"
            FALLBACK_USED="$(jq -r '.fallback_used // false' /tmp/play-upload-result.json)"
            PRECONDITION_BLOCKED="$(jq -r '.precondition_blocked // false' /tmp/play-upload-result.json)"
            VERSION_CODE="$(jq -r '.version_code // empty' /tmp/play-upload-result.json)"
          fi

          if [ -z "$REQUESTED_TRACK" ] || [ "$REQUESTED_TRACK" = "null" ]; then
            REQUESTED_TRACK="${{ inputs.android_track }}"
          fi
          if [ -z "$EFFECTIVE_TRACK" ] || [ "$EFFECTIVE_TRACK" = "null" ]; then
            EFFECTIVE_TRACK="$REQUESTED_TRACK"
          fi

          echo "requested_track=$REQUESTED_TRACK" >> "$GITHUB_OUTPUT"
          echo "effective_track=$EFFECTIVE_TRACK" >> "$GITHUB_OUTPUT"
          echo "fallback_used=$FALLBACK_USED" >> "$GITHUB_OUTPUT"
          echo "precondition_blocked=$PRECONDITION_BLOCKED" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "play_result requested=$REQUESTED_TRACK effective=$EFFECTIVE_TRACK version_code=$VERSION_CODE fallback_used=$FALLBACK_USED precondition_blocked=$PRECONDITION_BLOCKED"

      - name: Upload Play upload result (if any)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: play-upload-result
          path: /tmp/play-upload-result.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload Play upload error (if any)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: play-upload-error
          path: /tmp/play-upload-error.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-aab
          path: android/Agent-Bill/app/build/outputs/bundle/release/app-release.aab
          retention-days: 5

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.keystore /tmp/play-service-account.json
