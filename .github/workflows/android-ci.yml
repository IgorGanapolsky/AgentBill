name: Android CI/CD Regression Prevention

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/agent-bill/gradlew

      - name: Run JVM Unit Tests
        run: |
          cd android/agent-bill
          ./gradlew testDebugUnitTest

      - name: Generate Code Coverage Report
        run: |
          cd android/agent-bill
          ./gradlew jacocoTestReport

      - name: Verify Code Coverage Exists
        run: |
          ls -lh android/agent-bill/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          ls -lh android/agent-bill/app/build/reports/jacoco/jacocoTestReport/html/index.html

      # --- Instrumented E2E: research-verified stable emulator setup (June 2026) ---
      # KVM is NOT granted by default on ubuntu runners; without it x86_64 emulators fall back to
      # software rendering and hit boot-timeout / ShellCommandUnresponsiveException / broken-pipe.
      # AgentBill is a PUBLIC repo, so GitHub-hosted Actions minutes are free/unlimited — run the
      # full E2E on every PR and push for maximum coverage (workflow_dispatch also available).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the AVD + a clean boot snapshot across runs (keyed by API level), so the test step
      # warm-boots instead of cold-booting. Cold boots are the root cause of the
      # "ShellCommandUnresponsiveException -> Unknown API Level -> 0 compatible devices" failure.
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api29-google_apis-x86_64

      - name: Create AVD and generate clean snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated clean AVD snapshot for caching."

      - name: Run Instrumented E2E UI Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          # -gpu swiftshader_indirect (NOT "off"): off can break GLES surface init; swiftshader is
          # the action's documented headless default. -no-snapshot-save: reuse the cached snapshot
          # read-only for a fast, deterministic warm boot.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android/agent-bill
          script: ./gradlew connectedDebugAndroidTest
